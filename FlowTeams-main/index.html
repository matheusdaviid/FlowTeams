<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTeams</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/carrossel.css"> <!-- Carrega o CSS do carrossel -->
</head>
<body>
    <!-- Menu lateral esquerdo -->
    <div class="sidebar">
        <!-- Logo do site -->
        <img src="./assets/img/Logo do site.png" alt="Logo do site" class="logo">
        <!-- Menu com opções de navegação dispostas verticalmente -->
        <div class="menu">
            <button><i class="bi bi-house"></i> Início</button>
            <button><i class="bi bi-kanban"></i> Projetos</button>
            <button><i class="bi bi-calendar2-date"></i> Calendário</button>
            <button><i class="bi bi-people-fill"></i> Equipes</button>
        </div>
    </div>

    <!-- Conteúdo principal do site -->
    <div class="main-content">
        <!-- Barra de busca -->
        <header>
            <input type="text" placeholder="Pesquise aqui" class="search-bar">
        </header>

        <!-- Componente branco que agrupa o carrossel e a seção de designs recentes -->
        <div class="content-wrapper">
            <!-- Carrossel de boas-vindas -->
            <div class="welcome-carousel">
                <img src="./assets/img/Carrossel.png" alt="Carrossel" class="carousel-image">
                <h1>BEM VINDO AO <span class="underline">FLOWTEAMS</span></h1>
            </div>

            <!-- Seção de designs recentes -->
            <section class="recent-designs">
                <h2>Designs recentes</h2>
                <div class="designs-grid">
                    <!-- Cada design recente com ícone e texto -->
                    <div class="design">
                        <div class="design-thumbnail"></div>
                        <p>Trabalho</p>
                    </div>
                    <div class="design">
                        <div class="design-thumbnail"></div>
                        <p>Pirâmide de comport...</p>
                    </div>
                    <div class="design">
                        <div class="design-thumbnail"></div>
                        <p>Design em grupo</p>
                    </div>
                    <div class="design">
                        <div class="design-thumbnail"></div>
                        <p>Trabalho sem nome</p>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>

</html>
